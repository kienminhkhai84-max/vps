name: RDP Bore Tunnel v6 (Ultimate Fix)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup RDP & Fix NLA (Registry Method)
        run: |
          Write-Host "--- Cấu hình RDP & Tắt NLA qua Registry ---" -ForegroundColor Cyan
          
          # 1. Bật Remote Desktop
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          
          # 2. Tắt NLA (Xác thực mức mạng) - Khắc phục lỗi sập khi tunnel bắt tay
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          
          # 3. Ép RDP chỉ dùng TCP (Bore không hỗ trợ UDP)
          $policyPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          if (!(Test-Path $policyPath)) { New-Item -Path $policyPath -Force }
          Set-ItemProperty -Path $policyPath -Name "SelectNetworkDetect" -Value 0 -Type DWORD -Force
          
          # 4. Mở Firewall cổng 3389
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 5. Tạo User và cấp quyền
          $userName = "DucthengTechDz"
          if (!(Get-LocalUser -Name $userName -ErrorAction SilentlyContinue)) {
              $Password = ConvertTo-SecureString "W1nd0ws-P4ssw0rd-2025!" -AsPlainText -Force
              New-LocalUser $userName -Password $Password -Description "RDP Account"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $userName
              Add-LocalGroupMember -Group "Administrators" -Member $userName
          }

      - name: Start Bore Client
        run: |
          Write-Host "--- Tải & Khởi chạy Bore Client ---" -ForegroundColor Cyan
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x86_64-pc-windows" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath . -Force
          
          # Đợi dịch vụ RDP sẵn sàng hoàn toàn
          while (!(Test-NetConnection localhost -Port 3389 -WarningAction SilentlyContinue).TcpTestSucceeded) { 
              Write-Host "Đang đợi RDP mở cửa..."
              Start-Sleep -Seconds 2 
          }

          $SERVER_IP = "34.46.25.187"
          $SECRET = "TrueHieuDz"
          
          # Khởi chạy tunnel ngầm
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to $SERVER_IP --secret $SECRET --to-host 127.0.0.1" -WindowStyle Hidden -RedirectStandardOutput "bore_log.txt" -RedirectStandardError "bore_err.txt"
          
          # Chờ lấy Port
          Start-Sleep -Seconds 20
          $boreLog = Get-Content "bore_log.txt" -Raw
          if ($boreLog -match "listening at ([\d\.]+:[\d]+)") {
              $rdpAddress = $matches[1]
              Write-Host "===> ADDRESS: $rdpAddress" -ForegroundColor Green
              "IP: $rdpAddress`nUSER: DucthengTechDz`nPASS: W1nd0ws-P4ssw0rd-2025!" | Out-File -FilePath rdp-info.txt
              
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add rdp-info.txt; git commit -m "Update RDP: $rdpAddress"; git push
          } else {
              Write-Host "Không tìm thấy Port trong log. Nội dung log:" -ForegroundColor Red
              Get-Content "bore_log.txt"
          }

      - name: Keep Alive & Log Monitoring
        run: |
          Write-Host "--- Tunnel đang hoạt động ổn định ---" -ForegroundColor Magenta
          $lastLog = ""
          while($true) {
              if (Test-Path "bore_log.txt") {
                  $currentLog = Get-Content "bore_log.txt" -Tail 1
                  if ($currentLog -ne $lastLog) {
                      Write-Host "[$(Get-Date -Format 'HH:mm:ss')] $currentLog"
                      $lastLog = $currentLog
                  }
              }
              Start-Sleep -Seconds 10
          }
