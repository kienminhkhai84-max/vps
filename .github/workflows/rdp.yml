- name: Install & Start Bore Tunnel
        run: |
          Write-Host "Đang tải Bore tự động..."
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ekzhang/bore/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x86_64-pc-windows" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath . -Force
          
          Write-Host "Khởi chạy Bore Client ngầm..."
          $SERVER_IP = "34.46.25.187"
          
          # Chạy và đẩy log ra file
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to $SERVER_IP" -WindowStyle Hidden -RedirectStandardOutput "bore_log.txt" -RedirectStandardError "bore_err.txt"
          
          Write-Host "Đang chờ Bore thiết lập kết nối (20s)..."
          Start-Sleep -Seconds 20
          
          $boreLog = Get-Content "bore_log.txt" -Raw
          # Regex chuẩn để bắt dạng: listening at 34.46.25.187:12345
          $regex = "listening at ([\d\.]+:[\d]+)"
          $rdpAddress = "Chưa lấy được IP. Check log server hoặc firewall GCP nhé đại ca!"
          
          if ($boreLog -match $regex) {
              $rdpAddress = $matches[1]
              Write-Host "===> THÀNH CÔNG! ĐỊA CHỈ RDP: $rdpAddress" -ForegroundColor Green
          } else {
              Write-Host "Log hiện tại của Bore:"
              Write-Host $boreLog -ForegroundColor Yellow
          }
          
          # Lưu file info
          @"
          RDP_USER=DucthengTechDz
          RDP_PASS=W1nd0ws-P4ssw0rd-2025!
          RDP_ADDRESS=$rdpAddress
          LƯU Ý: Copy địa chỉ trên vào Remote Desktop Connection là xong ạ!
          "@ | Out-File -FilePath rdp-info.txt -Encoding utf8
          
          # Commit kết quả
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rdp-info.txt
          git commit -m "Update RDP info: $rdpAddress"
          git push
