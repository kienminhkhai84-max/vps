name: RDP Localtonet

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1450 # Max limit 24h

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup RDP & Download Localtonet
        run: |
          # Tự động thử các link tải Localtonet mới nhất để tránh lỗi 404
          $urls = @(
              "https://localtonet.com/download/localtonet-win-64.zip",
              "https://localtonet.com/download/localtonet-windows-64.zip",
              "https://localtonet.com/download/localtonet-windows.zip"
          )
          foreach ($url in $urls) {
              try {
                  Write-Host "Đang thử tải từ: $url"
                  Invoke-WebRequest -Uri $url -OutFile localtonet.zip -UseBasicParsing
                  if (Test-Path localtonet.zip) { break }
              } catch {
                  Write-Host "Link $url bị lỗi 404, thử link khác..."
              }
          }
          
          Expand-Archive localtonet.zip -DestinationPath .
          
          # Cấu hình RDP và tạo User
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-LocalUser "DucthengTechDz" -Password (ConvertTo-SecureString "W1nd0ws-P4ssw0rd-2025!" -AsPlainText -Force)
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "DucthengTechDz"
          Add-LocalGroupMember -Group "Administrators" -Member "DucthengTechDz"
          
          # Tối ưu hóa đồ họa RDP
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fEnableVirtualizedGraphics" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "AVCHardwareEncodePreferred" -Value 1 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MinFrameRate" -Value 120 -Type DWord -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableWallpaper" -Value 1 -Type DWord -Force
          powercfg /setactive a1841308-3541-4fab-bc81-f71556f20b4a
          
          # Lưu credentials lên Repo
          @"
          RDP_USER=DucthengTechDz
          RDP_PASS=W1nd0ws-P4ssw0rd-2025!
          LƯU Ý: IP và Port đại ca xem trực tiếp trên Dashboard của Localtonet nhé!
          "@ | Out-File -FilePath rdp-info.txt -Encoding utf8
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add rdp-info.txt
          git commit -m "Update RDP info (Localtonet)" || exit 0
          git push
          
      - name: Start Localtonet Tunnel
        run: |
          # Chạy Localtonet ngầm với Auth Token cứng
          Start-Process -FilePath ".\localtonet.exe" -ArgumentList "-t qGBTCY1z9LyhfAxgKvEXkVUsHFjSJiDRp" -NoNewWindow
          
          # Sleep để giữ VPS sống
          Start-Sleep -Seconds 86400
